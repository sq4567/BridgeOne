; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = geekble_nano_esp32s3

[env:geekble_nano_esp32s3]
platform = espressif32
board = esp32s3usbotg
framework = arduino

; Geekble nano ESP32-S3 하드웨어 특화 설정
; MCU: Dual-core Xtensa LX7 (240MHz max)
; 메모리: 512KB SRAM, 384KB ROM, 8MB Flash
board_build.flash_size = 8MB
board_build.psram_type = opi
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L

; Arduino HID + Vendor CDC 하이브리드 방식 활성화
; USB Device 모드로 HID 및 CDC 동시 지원
build_flags = 
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DCONFIG_TINYUSB_ENABLED=1
    -DCONFIG_TINYUSB_CDC_ENABLED=1
    -DCONFIG_TINYUSB_HID_ENABLED=1
    -Os
    -DCORE_DEBUG_LEVEL=1

; 대용량 애플리케이션을 위한 파티션 테이블
board_build.partitions = huge_app.csv

; 필수 라이브러리 의존성
lib_deps = 
    bblanchon/ArduinoJson@^6.21.0
    robtillaart/CRC@^1.0.1

; 시리얼 모니터 설정
monitor_speed = 115200
monitor_filters = default, colorize

; 업로드 설정
upload_speed = 921600
