; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32s3_wroom_test

; ============================================================================
; 공통 설정
; ============================================================================
[env]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; ESP32-S3-WROOM-1-N16R8 하드웨어 설정
; MCU: Dual-core Xtensa LX7 (240MHz max)
; 실제 하드웨어: 16MB Flash (확인됨), 8MB PSRAM (물리적으로 존재하나 현재 비활성화)
; USB: Native USB-OTG 지원 (Device 모드)
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_size = 16MB

; 파티션 테이블: 기본값 사용 (custom 파티션 테이블은 bootloop 유발)
; board_build.partitions = default_16MB.csv  ; 비활성화

; PSRAM 설정 - 비활성화 (OPI/OctalSPI 모드는 bootloop 유발)
; 물리적으로 8MB PSRAM이 장착되어 있으나, 현재 설정으로는 사용 불가
; 추후 다른 방식으로 활성화 시도 필요
; board_build.arduino.memory_type = qio_opi
; board_build.psram_type = opi

; 필수 라이브러리 의존성
lib_deps = 
    bblanchon/ArduinoJson@^6.21.0
    robtillaart/CRC@^1.0.1

; 시리얼 모니터 설정
monitor_speed = 115200
monitor_filters = default, colorize
monitor_dtr = 0          ; DTR 신호 비활성화 (ESP32-S3 리셋 방지)
monitor_rts = 0          ; RTS 신호 비활성화 (부트로더 진입 방지)

; 업로드 설정
upload_speed = 921600

; ============================================================================
; 테스트 환경: 개발 및 디버깅용
; ============================================================================
; Serial.print() 출력이 USB CDC로 정상 동작
; HID 기능도 동시에 사용 가능
; Phase 1.1.2.1 ~ 1.2.4.x 개발 단계에서 사용
[env:esp32s3_wroom_test]
build_flags = 
    -D ARDUINO_USB_MODE=1               ; USB OTG 모드
    -D ARDUINO_USB_CDC_ON_BOOT=1        ; 부팅 시 CDC 활성화 (시리얼 출력 가능)
    -D CONFIG_TINYUSB_ENABLED=1
    -D CONFIG_TINYUSB_CDC_ENABLED=1
    -D CONFIG_TINYUSB_HID_ENABLED=1
    -Os
    -D CORE_DEBUG_LEVEL=3               ; 상세 디버그 로그

; ============================================================================
; 실사용 환경: HID 장치로 운영
; ============================================================================
; HID 장치가 우선 열거되며, Vendor CDC는 보조 채널로 동작
; Serial.print() 출력은 동작하지 않음 (CDC_ON_BOOT=0)
; Phase 1.3.x 이후 통합 테스트 및 최종 배포 시 사용
[env:esp32s3_wroom]
build_flags = 
    -D ARDUINO_USB_MODE=1               ; USB OTG 모드
    -D ARDUINO_USB_CDC_ON_BOOT=0        ; HID 우선 (시리얼 출력 비활성화)
    -D CONFIG_TINYUSB_ENABLED=1
    -D CONFIG_TINYUSB_CDC_ENABLED=1
    -D CONFIG_TINYUSB_HID_ENABLED=1
    -Os
    -D CORE_DEBUG_LEVEL=1               ; 최소 로그
